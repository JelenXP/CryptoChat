name: UI tests

# Instrumentované UI testy (androidTest) na emulátoru. Ověří, že se aplikace
# spustí a projde základní obrazovka. Běží při každém pushi do main/master.
# Je to samostatný workflow, takže případný pád neblokuje sestavení APK.
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  ui-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.7

      # Emulátor s hardwarovou akcelerací (KVM) - jinak by běžel velmi pomalu.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumented UI tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          target: default
          disable-animations: true
          script: gradle connectedDebugAndroidTest
