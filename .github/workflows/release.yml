name: Release signed APK

# Spustí se po pushnutí tagu začínajícího "v" (např. v1.0, v1.2.3).
# Sestaví podepsané release APK (tvým keystorem z GitHub Secrets) a nahraje
# ho jako přílohu do GitHub Releases.
on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write   # potřeba, aby GITHUB_TOKEN mohl vytvořit Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.7

      # Keystore i hesla se rekonstruují ze Secrets (keystore.properties je
      # gitignorovaný, v repu není). Hodnoty jdou přes env, ne přímo do shellu,
      # aby speciální znaky v heslech nedělaly problém a nešly do logu.
      - name: Recreate signing config from secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
          {
            echo "storeFile=release.keystore"
            echo "storePassword=$KEYSTORE_PASSWORD"
            echo "keyAlias=$KEY_ALIAS"
            echo "keyPassword=$KEY_PASSWORD"
          } > keystore.properties

      - name: Run unit tests
        run: gradle testDebugUnitTest

      - name: Build signed release APK
        run: gradle assembleRelease

      - name: Publish to GitHub Releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # APK pojmenujeme podle verze, ať je ve stažení jasně vidět, o co jde.
          cp app/build/outputs/apk/release/app-release.apk "CryptoChat-${{ github.ref_name }}.apk"
          # Idempotentně: pokud release pro tenhle tag už existuje, smažeme ho
          # (jen release, ne tag) a vytvoříme znovu - aby re-run vždy prošel a
          # nikdy nezůstalo staré/špatné APK.
          gh release delete "${{ github.ref_name }}" --yes || true
          gh release create "${{ github.ref_name }}" "CryptoChat-${{ github.ref_name }}.apk" \
            --title "${{ github.ref_name }}" \
            --generate-notes

      # Úklid citlivých souborů (runner je stejně efemérní, ale pro jistotu).
      - name: Cleanup secrets
        if: always()
        run: rm -f release.keystore keystore.properties
